
name: Deploy OnlyFrames

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: dotnet test OnlyFrames.Tests/OnlyFrames.Tests.csproj --no-build --verbosity normal
  
  deploy:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: szachuz.lol
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_REPOSITORY
          script: |
            set -e
            
            APP_DIR=/opt/onlyframes
            
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/$GITHUB_REPOSITORY $APP_DIR
            else
              cd $APP_DIR && git pull origin main
            fi
            
            mkdir -p $APP_DIR/media/videos \
                     $APP_DIR/media/captions \
                     $APP_DIR/media/avatars
            chown -R 1654:1654 $APP_DIR/media
            
            export PATH=$PATH:$HOME/.aspire/bin:$HOME/.dotnet:$HOME/.dotnet/tools
            cd $APP_DIR/OnlyFrames.AppHost
            aspire deploy
